<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>Depósito · Picking</title>
<link rel="stylesheet" href="style.css?v=3" />
<style>
  body { background: #f0f1f3; }
  .app { max-width: 560px; margin: 0 auto; min-height: 100vh; background: var(--bg); }

  /* order list */
  .pickcard { display:flex; justify-content:space-between; align-items:center; gap:12px;
    background: var(--surface); border:1px solid var(--line); border-radius: var(--radius);
    padding: 18px 18px; margin: 12px; cursor:pointer; }
  .pickcard:active { transform: scale(.99); }
  .pickcard .num { font-size: 20px; font-weight: 700; }
  .pickcard .meta { font-size: 14px; color: var(--muted); margin-top: 3px; }
  .go { font-size: 28px; color: var(--faint); }

  /* picking header */
  .phead { position: sticky; top: 0; z-index: 5; background: var(--surface); border-bottom:1px solid var(--line); padding: 12px 14px; }
  .phead .top { display:flex; align-items:center; gap:10px; }
  .back { font-size: 26px; background:none; border:none; color: var(--muted); cursor:pointer; padding:4px 6px; }
  .phead .num { font-size: 19px; font-weight: 700; }
  .phead .cust { font-size: 13px; color: var(--muted); }
  .pbar { height: 12px; background:#e4e7ec; border-radius:999px; overflow:hidden; margin-top:10px; }
  .pbar > i { display:block; height:100%; background: var(--green); transition: width .3s; }
  .pcount { font-size: 13px; color: var(--muted); margin-top:6px; }

  /* scan bar */
  .scanbar { background: #eef1f5; padding: 12px 14px; border-bottom:1px solid var(--line); position: sticky; top: 96px; z-index: 4; }
  .scanrow { display:flex; gap:8px; align-items:center; }
  #scan { flex:1; font-size: 18px; height: 52px; border:1px solid var(--line); border-radius: 12px; padding: 0 14px; background:#fff; }
  #scan:focus { outline: 3px solid #bcd3f7; border-color: var(--brand); }
  .cambtn { height:52px; width:56px; border:1px solid var(--line); border-radius:12px; background:#fff; font-size:22px; cursor:pointer; }
  .scanmsg { font-size: 14px; margin-top: 7px; min-height: 20px; color: var(--muted); font-weight: 500; }

  /* lines */
  .line { background: var(--surface); border:1px solid var(--line); border-left: 5px solid transparent;
    border-radius: var(--radius); margin: 10px 12px; padding: 14px 14px; }
  .line.picked { border-left-color: var(--green); }
  .line.partial { border-left-color: var(--amber); }
  .line.nostock { border-left-color: var(--red); opacity: .92; }
  .lsku { font-size: 22px; font-weight: 800; line-height: 1.1; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: .5px; }
  .lname { font-size: 15px; font-weight: 500; line-height: 1.25; margin-top: 3px; color: var(--ink); }
  .lqty { font-size: 13px; color: var(--muted); margin-top: 4px; font-weight: 500; }
  .lcode { font-size: 11px; color: var(--faint); margin-top: 3px; font-family: ui-monospace, monospace; }

  /* autocomplete */
  .sugg { margin-top: 8px; background:#fff; border:1px solid var(--line); border-radius: 12px; overflow:hidden; }
  .sugg.hide { display:none; }
  .sopt { display:flex; align-items:center; justify-content:space-between; gap:10px; padding: 11px 12px; cursor:pointer; border-bottom:1px solid var(--line); }
  .sopt:last-child { border-bottom:none; }
  .sopt:active { background:#eef1f5; }
  .sopt .ssku { font-weight:800; font-family: ui-monospace, monospace; }
  .sopt .sname { color: var(--muted); font-size:13px; }
  .sopt.resolved { opacity:.5; }
  .qtybig { font-size: 26px; font-weight: 800; line-height:1; }
  .qtylbl { font-size: 11px; color: var(--muted); text-transform: uppercase; }
  .badge { font-size: 13px; font-weight: 700; padding: 5px 12px; border-radius: 999px; }
  .badge.picked { background: var(--green-bg); color: var(--green-ink); }
  .badge.partial { background: var(--amber-bg); color: var(--amber-ink); }
  .badge.nostock { background: var(--red-bg); color: var(--red-ink); }
  .badge.progress { background: #e6f1fb; color: #185fa5; }
  .line.inprogress { border-left-color: var(--brand); }
  .acts { display:flex; gap:10px; margin-top: 14px; }
  .big { flex:1; height: 56px; font-size: 16px; font-weight: 700; border-radius: 12px; border:1.5px solid; background:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; }
  .big:active { transform: scale(.98); }
  .big.nostock { color: var(--red-ink); border-color: #f0a3a3; }
  .big.partial { color: var(--amber-ink); border-color: var(--amber); }
  .big.pick { color: var(--green-ink); border-color: var(--green); }
  .big.armed { font-weight: 800; border-width: 2.5px; }
  .big.nostock.armed { background: var(--red-bg); border-color: var(--red); }
  .big.pick.armed { background: var(--green-bg); border-color: var(--green); }
  .undo { margin-top:12px; background:none; border:none; color: var(--muted); font-size:14px; cursor:pointer; }
  .undo.armed { color: var(--ink); font-weight: 800; }

  .done { text-align:center; padding: 40px 20px; }
  .done .ico { font-size: 60px; }
  .done h2 { font-size: 22px; margin: 8px 0 4px; }

  /* numpad modal */
  .modal { position: fixed; inset: 0; background: rgba(0,0,0,.45); display:flex; align-items:flex-end; justify-content:center; z-index: 50; }
  .sheet { background:#fff; width:100%; max-width:560px; border-radius: 20px 20px 0 0; padding: 18px; }
  .sheet h3 { margin: 0 0 4px; font-size: 18px; }
  .npdisplay { font-size: 40px; font-weight: 800; text-align:center; padding: 14px; margin: 10px 0; background: var(--bg); border-radius: 12px; }
  .npgrid { display:grid; grid-template-columns: repeat(3,1fr); gap:10px; }
  .npgrid button { height: 62px; font-size: 24px; font-weight:700; border:1px solid var(--line); border-radius:12px; background:#fff; cursor:pointer; }
  .npgrid button:active { background:#eef1f5; }
  .npconfirm { margin-top:12px; width:100%; height:56px; font-size:17px; font-weight:700; border:none; border-radius:12px; background: var(--green); color:#fff; cursor:pointer; }
  #reader { width: 100%; margin-top: 10px; border-radius:12px; overflow:hidden; }
  .hide { display:none; }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js?v=3"></script>
<script src="catalog.js?v=3"></script>
<script src="store.js?v=3"></script>
<script>
const app = document.getElementById("app");
let currentOrderId = null;
let html5qr = null;

// allow deep-link: warehouse.html#<orderId>
function init() {
  const hash = location.hash.slice(1);
  if (hash && Store.getOrder(hash)) currentOrderId = hash;
  render();
}

function render() {
  if (currentOrderId && Store.getOrder(currentOrderId)) renderPicking();
  else renderOrderList();
}

// ---------- order list ----------
function renderOrderList() {
  currentOrderId = null;
  if (location.hash) history.replaceState(null, "", location.pathname);
  const orders = Store.getOrders().filter((o) => o.status !== "ready");
  let html = `<div class="topbar"><div><h1>Depósito</h1><div class="sub">Pedidos para pickear</div></div></div>`;
  if (!orders.length) {
    html += `<div style="padding:40px; text-align:center; color:var(--muted)">No hay pedidos pendientes.<br><br>La oficina los carga desde su pantalla.</div>`;
  } else {
    html += orders.map((o) => {
      const done = o.resolvedCount || 0, tot = o.lines.length;
      return `<div class="pickcard" data-id="${o.id}">
        <div><div class="num">Pedido ${o.number}</div>
          <div class="meta">${o.customer ? o.customer + " · " : ""}${tot} líneas${done ? " · " + done + "/" + tot + " hechas" : ""}</div></div>
        <div class="go">›</div></div>`;
    }).join("");
  }
  app.innerHTML = html;
  app.querySelectorAll(".pickcard").forEach((el) =>
    el.addEventListener("click", () => { currentOrderId = el.dataset.id; history.replaceState(null,"","#"+currentOrderId); render(); }));
}

// ---------- picking ----------
function renderPicking() {
  const o = Store.getOrder(currentOrderId);
  const done = o.resolvedCount || 0, tot = o.lines.length;
  const pct = tot ? Math.round(done / tot * 100) : 0;

  let html = `
    <div class="phead">
      <div class="top">
        <button class="back" id="back">‹</button>
        <div><div class="num">Pedido ${o.number}</div><div class="cust">${o.customer || ""}</div></div>
      </div>
      <div class="pbar"><i style="width:${pct}%"></i></div>
      <div class="pcount">${done} de ${tot} líneas resueltas</div>
    </div>
    <div class="scanbar">
      <div class="scanrow">
        <input id="scan" autocomplete="off" placeholder="Buscar por SKU o escribir código…" />
        <button class="cambtn" id="cam" title="Cámara">📷</button>
      </div>
      <div class="scanmsg" id="scanmsg">Escaneá con la pistola y se procesa solo · EAN = 1 unidad · DUN = 1 bulto</div>
      <div id="sugg" class="sugg hide"></div>
      <div id="reader" class="hide"></div>
    </div>`;

  html += o.lines.slice().sort((a, b) => skuCompare(a.sku, b.sku)).map((l) => lineHtml(l)).join("");

  if (o.complete) {
    html += `<div class="done"><div class="ico">✅</div><h2>Pedido completo</h2>
      <div class="muted">Enviado a la oficina para facturar.</div>
      <div style="margin-top:18px;"><button class="btn" id="back2">Volver a pedidos</button></div></div>`;
  } else {
    const can = o.canFinalize;
    const pend = tot - (o.resolvedCount || 0);
    html += `<div style="padding:20px 12px 32px; text-align:center;">
      <button class="btn primary" id="finalize" ${can ? "" : "disabled"}
        style="width:100%; max-width:520px; height:52px; font-size:16px; font-weight:700; opacity:${can ? 1 : 0.45}; cursor:${can ? "pointer" : "not-allowed"};">Finalizar pedido y enviar a oficina</button>
      <div class="muted" style="font-size:12px; margin-top:8px;">${can
        ? "Usalo cuando terminaste, aunque queden parciales o sin stock."
        : "Faltan " + pend + " línea(s) por marcar (listo / parcial / sin stock)."}</div>
    </div>`;
  }
  app.innerHTML = html;

  // wiring
  document.getElementById("back").onclick = stopAndBack;
  if (document.getElementById("back2")) document.getElementById("back2").onclick = stopAndBack;
  if (document.getElementById("finalize")) document.getElementById("finalize").onclick = () => {
    if (confirm("¿Finalizar el pedido y enviarlo a la oficina?")) { Store.finalizeOrder(currentOrderId); stopAndBack(); }
  };
  const scan = document.getElementById("scan");
  scan.addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); hideSuggestions(); doScan(scan.value); scan.value = ""; } });
  scan.addEventListener("input", () => renderSuggestions(scan.value));
  document.getElementById("cam").onclick = toggleCamera;
  app.querySelectorAll("[data-act]").forEach((b) => b.addEventListener("click", onAct));
  refocus();
}

// Natural SKU sort: split into digit / non-digit chunks and compare numerically
// where both are numbers. Keeps a base code and its "/" variants together
// (e.g. 2215, 2215/20, 2215/5) and orders bases naturally (717 < 2215 < 12310).
function skuCompare(a, b) {
  const ax = String(a).match(/(\d+|\D+)/g) || [];
  const bx = String(b).match(/(\d+|\D+)/g) || [];
  for (let i = 0; i < Math.min(ax.length, bx.length); i++) {
    if (ax[i] === bx[i]) continue;
    const aNum = /^\d+$/.test(ax[i]), bNum = /^\d+$/.test(bx[i]);
    if (aNum && bNum) return parseInt(ax[i], 10) - parseInt(bx[i], 10);
    return ax[i] < bx[i] ? -1 : 1;
  }
  return ax.length - bx.length;
}

function lineHtml(l) {
  const upb = l.unitsPerBulk || 1;
  const bultos = l.bultos || 1;
  const picked = l.qtyPicked || 0;
  const remaining = Math.max(0, l.qtyOrdered - picked);

  let badge = "";
  if (l.status === "picked") badge = `<span class="badge picked">✓ Listo</span>`;
  else if (l.status === "nostock") badge = `<span class="badge nostock">Sin stock</span>`;
  else if (l.status === "partial" && l.committed) badge = `<span class="badge partial">Parcial ${picked}/${l.qtyOrdered} u</span>`;
  else if (picked > 0) badge = `<span class="badge progress">Escaneando ${picked}/${l.qtyOrdered} u</span>`;

  const acts = `<div class="acts">
      <button class="big nostock" data-act="nostock" data-id="${l.id}">✕ Sin stock</button>
      <button class="big partial" data-act="partial" data-id="${l.id}">± Parcial</button>
      <button class="big pick" data-act="pick" data-id="${l.id}">✓ Listo</button>
    </div>`;
  const undo = `<button class="undo" data-act="undo" data-id="${l.id}">↺ Deshacer</button>`;
  let body;
  if (l.committed) body = undo;                 // resolved (Listo / Sin stock / Parcial)
  else if (picked > 0) body = acts + undo;      // in progress: keep going or reset
  else body = acts;                              // untouched

  const detail = `${l.qtyOrdered} u · ${bultos} ${bultos === 1 ? "bulto" : "bultos"}${upb > 1 ? ` · ${upb} u/bulto` : ""}`;
  const bigNum = l.status === "picked" ? "✓" : remaining;
  const bigLbl = l.status === "picked" ? "listo" : "u. faltan";
  const inProgress = !l.committed && picked > 0 ? " inprogress" : "";
  return `<div class="line ${l.status}${inProgress}">
    <div style="display:flex; justify-content:space-between; gap:12px;">
      <div style="flex:1;">
        <div class="lsku">${l.sku}</div>
        <div class="lname">${l.name}</div>
        <div class="lqty">${detail}</div>
        <div class="lcode">EAN ${l.ean || "—"}${l.dun ? " · DUN " + l.dun : ""}</div>
      </div>
      <div style="text-align:right;">
        <div class="qtybig">${bigNum}</div><div class="qtylbl">${bigLbl}</div>
        <div style="margin-top:6px;">${badge}</div>
      </div>
    </div>${body}</div>`;
}

// ---------- actions ----------
let armTimer = null;
function disarm(btn) {
  if (!btn) return;
  btn.dataset.armed = "";
  btn.classList.remove("armed");
  if (btn.dataset.label) btn.textContent = btn.dataset.label;
}
function armButton(btn) {
  document.querySelectorAll(".armed").forEach((b) => { if (b !== btn) disarm(b); });
  if (!btn.dataset.label) btn.dataset.label = btn.textContent;
  btn.dataset.armed = "1";
  btn.classList.add("armed");
  btn.textContent = "Tocá de nuevo ✓";
  clearTimeout(armTimer);
  armTimer = setTimeout(() => disarm(btn), 3000);
}
function onAct(e) {
  const btn = e.currentTarget;
  const id = btn.dataset.id, act = btn.dataset.act;
  // "Listo", "Sin stock" and "Deshacer" need a second tap to confirm
  if (act === "pick" || act === "nostock" || act === "undo") {
    if (btn.dataset.armed !== "1") { armButton(btn); return; }
    clearTimeout(armTimer);
  }
  const l = lineById(id);
  if (act === "pick") setLine(id, { status: "picked", qtyPicked: l.qtyOrdered, bultosPicked: l.bultos, committed: true });
  else if (act === "nostock") setLine(id, { status: "nostock", qtyPicked: 0, bultosPicked: 0, committed: true });
  else if (act === "undo") setLine(id, { status: "pending", qtyPicked: 0, bultosPicked: 0, committed: false });
  else if (act === "partial") openNumpad(id);
}
function lineById(id) { return Store.getOrder(currentOrderId).lines.find((l) => l.id === id); }
function setLine(id, patch) { Store.updateLine(currentOrderId, id, patch); flashFor(patch); render(); }
function flashFor(patch) {
  if (patch.status === "picked") flash("✓ Listo", "var(--green-ink)");
  if (patch.status === "nostock") flash("Marcado sin stock", "var(--red-ink)");
  if (patch.status === "partial") flash("Parcial guardado", "var(--amber-ink)");
}

// Add (or remove, if delta<0) picked units to a line, recompute status, persist.
function applyPick(id, deltaUnits) {
  const l = lineById(id);
  let picked = (l.qtyPicked || 0) + deltaUnits;
  picked = Math.max(0, Math.min(l.qtyOrdered, picked));
  const upb = l.unitsPerBulk || 1;
  const full = picked >= l.qtyOrdered;
  const status = full ? "picked" : picked > 0 ? "partial" : "pending";
  // Scanning only COMMITS the line when it's fully picked; otherwise it's "in progress".
  Store.updateLine(currentOrderId, id, { status, qtyPicked: picked, bultosPicked: Math.floor(picked / upb), committed: full });
  return { picked, status, remaining: l.qtyOrdered - picked, line: l };
}

// The core 12 digits (GTIN-12) shared by a product's EAN-13 and its DUN-14.
// EAN-13  = CORE(12) + check          -> ean.slice(0,12)
// DUN-14  = indicator(1) + CORE(12) + check -> dun.slice(1,13)
function gtinCore(code) {
  if (/^\d{14}$/.test(code)) return code.slice(1, 13);
  if (/^\d{13}$/.test(code)) return code.slice(0, 12);
  return null;
}
function lineCore(l) { return l.ean ? l.ean.slice(0, 12) : (l.dun ? l.dun.slice(1, 13) : ""); }

// Interpret a scanned/typed code. EAN (13 digits) = +1 unit; DUN (14) = +UxC units.
// We match on the shared 12-digit core, so a DUN scan works even when no DUN was
// stored for the product (every product has an EAN). A typed SKU completes the line.
function processScan(rawCode) {
  const code = String(rawCode || "").trim();
  if (!code) return;
  const o = Store.getOrder(currentOrderId);
  if (!o) return;
  let line = null, delta = 1, kind = "unidad";

  if (/^\d{14}$/.test(code)) {
    kind = "bulto";
    line = o.lines.find((l) => l.dun === code) || o.lines.find((l) => lineCore(l) === code.slice(1, 13));
    if (line) delta = line.unitsPerBulk || 1;
  } else if (/^\d{13}$/.test(code)) {
    kind = "unidad"; delta = 1;
    line = o.lines.find((l) => l.ean === code) || o.lines.find((l) => lineCore(l) === code.slice(0, 12));
  }

  if (!line) {                                  // fallback: EAN/DUN/SKU regardless of length
    line = Store.matchScan(o, code);
    if (line) {
      if (line.dun === code) { delta = line.unitsPerBulk || 1; kind = "bulto"; }
      else if (line.ean === code) { delta = 1; kind = "unidad"; }
      else { delta = line.qtyOrdered - (line.qtyPicked || 0); kind = "SKU (completo)"; }
    }
  }

  if (!line) { flash("✕ No está en este pedido: " + code, "var(--red-ink)"); beep(false); clearScanInput(); return; }
  if (line.status === "picked") { flash("Ya completo: " + line.name, "var(--amber-ink)"); beep(true); clearScanInput(); return; }

  const res = applyPick(line.id, delta);
  const tail = res.status === "picked" ? "✓ COMPLETO" : `faltan ${res.remaining} u`;
  flash(`+${delta} u (${kind}) · ${line.name} — ${tail}`, res.status === "picked" ? "var(--green-ink)" : "var(--amber-ink)");
  beep(true);
  clearScanInput();
  render();
}
function clearScanInput() { const s = document.getElementById("scan"); if (s) s.value = ""; hideSuggestions(); }
// kept name for camera callback / manual Enter
function doScan(code) { processScan(code); }
function flash(msg, color) { const m = document.getElementById("scanmsg"); if (m) { m.textContent = msg; m.style.color = color; } }

// ---------- autocomplete (filtered to this order's products) ----------
function hideSuggestions() { const s = document.getElementById("sugg"); if (s) { s.classList.add("hide"); s.innerHTML = ""; } }
function renderSuggestions(query) {
  const box = document.getElementById("sugg");
  if (!box) return;
  const q = String(query || "").trim().toLowerCase();
  if (!q) { hideSuggestions(); return; }
  const o = Store.getOrder(currentOrderId);
  if (!o) { hideSuggestions(); return; }
  const matches = o.lines.filter((l) =>
    l.sku.toLowerCase().includes(q) || (l.ean && l.ean.includes(q)) ||
    (l.dun && l.dun.includes(q)) || (l.name && l.name.toLowerCase().includes(q))
  ).sort((a, b) => (a.status === "pending" ? 0 : 1) - (b.status === "pending" ? 0 : 1)).slice(0, 6);
  if (!matches.length) { box.innerHTML = `<div class="sopt resolved"><span class="sname">Sin coincidencias en este pedido</span></div>`; box.classList.remove("hide"); return; }
  box.innerHTML = matches.map((l) => {
    const done = l.status !== "pending";
    const tag = done ? `<span class="sname">${l.status === "picked" ? "ya pickeado" : l.status === "partial" ? "parcial" : "sin stock"}</span>` : `<span class="sname">pickear ${l.qtyOrdered}</span>`;
    return `<div class="sopt ${done ? "resolved" : ""}" data-sid="${l.id}">
      <span><span class="ssku">${l.sku}</span> <span class="sname">${l.name}</span></span>${tag}</div>`;
  }).join("");
  box.classList.remove("hide");
  box.querySelectorAll(".sopt[data-sid]").forEach((el) => el.addEventListener("click", () => {
    const l = lineById(el.dataset.sid);
    const input = document.getElementById("scan"); if (input) input.value = "";
    hideSuggestions();
    if (!l || l.status === "picked") { flash("Ya estaba resuelto: " + (l ? l.name : ""), "var(--amber-ink)"); refocus(); return; }
    Store.updateLine(currentOrderId, l.id, { status: "picked", qtyPicked: l.qtyOrdered, bultosPicked: l.bultos, committed: true });
    flash("✓ " + l.name, "var(--green-ink)"); beep(true);
    render();
  }));
}
// Hands-free: we do NOT auto-focus the input, so the global key listener
// captures gun scans. Tapping the input focuses it normally (keyboard pops up
// on phones); after any action the list re-renders a fresh, unfocused input,
// which returns us to gun mode. So this is intentionally a no-op.
function refocus() {}
function beep(ok) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator(); const g = ctx.createGain();
    osc.frequency.value = ok ? 880 : 220; osc.connect(g); g.connect(ctx.destination);
    g.gain.value = 0.08; osc.start(); osc.stop(ctx.currentTime + 0.12);
  } catch (e) {}
}

// ---------- numpad ----------
function openNumpad(id) {
  const l = lineById(id);
  // pre-fill with whatever was already scanned, so "got 12, rest missing" is one tap
  let val = (l.qtyPicked > 0 && l.qtyPicked < l.qtyOrdered) ? String(l.qtyPicked) : "";
  const modal = document.createElement("div");
  modal.className = "modal";
  const tot = l.qtyOrdered;
  const upbTxt = (l.unitsPerBulk || 1) > 1 ? ` (${l.bultos} bultos · ${l.unitsPerBulk} u/bulto)` : "";
  modal.innerHTML = `<div class="sheet">
    <h3>${l.name}</h3><div class="muted">¿Cuántas unidades de ${tot} pudiste pickear?${upbTxt}</div>
    <div class="npdisplay" id="npd">0</div>
    <div class="npgrid">${[1,2,3,4,5,6,7,8,9].map((n)=>`<button data-n="${n}">${n}</button>`).join("")}
      <button data-n="del">⌫</button><button data-n="0">0</button><button data-n="ok" style="color:var(--green-ink)">OK</button></div>
    <button class="npconfirm" id="npConfirm">Guardar</button>
    <button class="undo" id="npCancel" style="width:100%; margin-top:6px;">Cancelar</button>
  </div>`;
  document.body.appendChild(modal);
  const disp = modal.querySelector("#npd");
  const upd = () => disp.textContent = val === "" ? "0" : val;
  const save = () => {
    const v = parseInt(val || "0", 10);
    const upb = l.unitsPerBulk || 1;
    if (v <= 0) setLine(id, { status: "nostock", qtyPicked: 0, bultosPicked: 0, committed: true });
    else if (v >= tot) setLine(id, { status: "picked", qtyPicked: tot, bultosPicked: Math.floor(tot / upb), committed: true });
    else setLine(id, { status: "partial", qtyPicked: v, bultosPicked: Math.floor(v / upb), committed: true });
    document.body.removeChild(modal);
  };
  modal.querySelectorAll(".npgrid button").forEach((b) => b.onclick = () => {
    const n = b.dataset.n;
    if (n === "del") val = val.slice(0, -1);
    else if (n === "ok") return save();
    else if (val.length < 5) val += n;
    upd();
  });
  modal.querySelector("#npConfirm").onclick = save;
  modal.querySelector("#npCancel").onclick = () => { document.body.removeChild(modal); refocus(); };
  modal.onclick = (e) => { if (e.target === modal) { document.body.removeChild(modal); refocus(); } };
}

// ---------- camera ----------
function toggleCamera() {
  const reader = document.getElementById("reader");
  if (html5qr && html5qr.isScanning) { stopCamera(); return; }
  reader.classList.remove("hide");
  html5qr = new Html5Qrcode("reader");
  html5qr.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 150 } },
    (text) => { doScan(text); stopCamera(); },
    () => {}
  ).catch((err) => { flash("No pude abrir la cámara: " + err, "var(--red-ink)"); reader.classList.add("hide"); });
}
function stopCamera() {
  const reader = document.getElementById("reader");
  if (html5qr && html5qr.isScanning) html5qr.stop().then(() => { html5qr.clear(); reader && reader.classList.add("hide"); }).catch(()=>{});
  else if (reader) reader.classList.add("hide");
}
function stopAndBack() { stopCamera(); currentOrderId = null; render(); }

// ---------- hands-free scanner capture ----------
// A barcode gun types digits fast then stops. We buffer digits typed anywhere
// (no need to click the box) and process after a short idle gap. 13 digits = EAN
// (1 unit), 14 digits = DUN (1 bulk). Manual SKU search still works by tapping
// the box (we skip capture while it's focused).
let scanBuf = "";
let scanTimer = null;
const SCAN_GAP = 110; // ms of silence that marks the end of a scan burst
function flushScanBuf() {
  const code = scanBuf; scanBuf = "";
  if (code) processScan(code);
}
document.addEventListener("keydown", (e) => {
  if (!currentOrderId) return;                      // only on a picking screen
  if (document.querySelector(".modal")) return;     // numpad open
  const scan = document.getElementById("scan");
  if (scan && document.activeElement === scan) return; // user is typing manually
  if (e.key >= "0" && e.key <= "9") {
    scanBuf += e.key;
    clearTimeout(scanTimer);
    if (scanBuf.length >= 14) { clearTimeout(scanTimer); flushScanBuf(); }   // DUN max length
    else scanTimer = setTimeout(flushScanBuf, SCAN_GAP);
  } else if (e.key === "Enter" && scanBuf) {
    clearTimeout(scanTimer); flushScanBuf();
  }
});

// ---------- live sync (realtime across devices) ----------
function onStoreChange() {
  if (document.querySelector(".modal")) return;   // don't disrupt the number pad
  const s = document.getElementById("scan");
  if (s && document.activeElement === s) return;  // don't destroy the input while the user types
  if (!currentOrderId) {                            // a deep-linked order may exist now
    const h = location.hash.slice(1);
    if (h && Store.getOrder(h)) currentOrderId = h;
  } else if (!Store.getOrder(currentOrderId)) {
    currentOrderId = null;                          // order vanished (deleted)
  }
  render();
}
Store.subscribe(onStoreChange);
window.addEventListener("hashchange", init);
init();
</script>
